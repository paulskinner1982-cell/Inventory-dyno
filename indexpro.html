<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blast Load Calculator - Animated</title>
<link rel="manifest" href="manifest.webmanifest">
<style>
  body{font-family:sans-serif;margin:0;background:#0f172a;color:#fff;}
  .container{max-width:520px;margin:auto;padding:16px;}
  h1{text-align:center;font-size:28px;margin-bottom:8px;}
  input, button{width:100%;padding:12px;margin:6px 0;border-radius:8px;border:none;font-size:18px;}
  button{background:#22c55e;color:#fff;cursor:pointer;}
  .result{margin-top:12px;padding:10px;background:#111827;border-radius:12px;}
  .log{margin-top:16px;padding:10px;background:#1f2937;border-radius:12px;}
  canvas{display:block;margin:16px auto;background:#0f172a;}
</style>
</head>
<body>
<div class="container">
<h1>Blast Load Calculator</h1>
<input type="number" id="targetKg" placeholder="Target KG" step="any">
<button onclick="calculate()">Calculate</button>
<div class="result" id="output"></div>
<canvas id="truckCanvas" width="480" height="180"></canvas>
<div class="log">
<h3>Last 5 Loads</h3>
<ul id="loadLog"></ul>
</div>
</div>
<script>
const START_KG = 7495;
const DENSITY = 1.32;
const chart=[{inch:61,kg:31},{inch:60.5,kg:62},{inch:60,kg:93},{inch:59.5,kg:120},{inch:59,kg:148},{inch:58.5,kg:186},{inch:58,kg:224},{inch:57.5,kg:262},{inch:57,kg:300},{inch:56.5,kg:341},{inch:56,kg:383},{inch:55.5,kg:424},{inch:55,kg:466},{inch:54.5,kg:516},{inch:54,kg:567},{inch:53.5,kg:621},{inch:53,kg:676},{inch:52.5,kg:733},{inch:52,kg:791},{inch:51.5,kg:847},{inch:51,kg:904},{inch:50.5,kg:961},{inch:50,kg:1019},{inch:49.5,kg:1076},{inch:49,kg:1134},{inch:48.5,kg:1201},{inch:48,kg:1268},{inch:47.5,kg:1323},{inch:47,kg:1379},{inch:46.5,kg:1440},{inch:46,kg:1502},{inch:45.5,kg:1564},{inch:45,kg:1627},{inch:44.5,kg:1693},{inch:44,kg:1759},{inch:43.5,kg:1831},{inch:43,kg:1904},{inch:42.5,kg:1976},{inch:42,kg:2048},{inch:41.5,kg:2127},{inch:41,kg:2206},{inch:40.5,kg:2285},{inch:40,kg:2364},{inch:39.5,kg:2429},{inch:39,kg:2494},{inch:38.5,kg:2566},{inch:38,kg:2639},{inch:37.5,kg:2709},{inch:37,kg:2780},{inch:36.5,kg:2860},{inch:36,kg:2940},{inch:35.5,kg:3023},{inch:35,kg:3107},{inch:34.5,kg:3188},{inch:34,kg:3270},{inch:33.5,kg:3350},{inch:33,kg:3431},{inch:32.5,kg:3506},{inch:32,kg:3582},{inch:31.5,kg:3657},{inch:31,kg:3732},{inch:30.5,kg:3807},{inch:30,kg:3882},{inch:29.5,kg:3957},{inch:29,kg:4032},{inch:28.5,kg:4107},{inch:28,kg:4182},{inch:27.5,kg:4260},{inch:27,kg:4339},{inch:26.5,kg:4417},{inch:26,kg:4496},{inch:25.5,kg:4575},{inch:25,kg:4653},{inch:24.5,kg:4735},{inch:24,kg:4817},{inch:23.5,kg:4899},{inch:23,kg:4981},{inch:22.5,kg:5063},{inch:22,kg:5145},{inch:21.5,kg:5227},{inch:21,kg:5309},{inch:20.5,kg:5389},{inch:20,kg:5469},{inch:19.5,kg:5548},{inch:19,kg:5628},{inch:18.5,kg:5707},{inch:18,kg:5787},{inch:17.5,kg:5865},{inch:17,kg:5942},{inch:16.5,kg:6017},{inch:16,kg:6093},{inch:15.5,kg:6164},{inch:15,kg:6235},{inch:14.5,kg:6305},{inch:14,kg:6376},{inch:13.5,kg:6446},{inch:13,kg:6517},{inch:12.5,kg:6587},{inch:12,kg:6658},{inch:11.5,kg:6728},{inch:11,kg:6799},{inch:10.5,kg:6870},{inch:10,kg:6940},{inch:9.5,kg:7005},{inch:9,kg:7070},{inch:8.5,kg:7133},{inch:8,kg:7196},{inch:7.5,kg:7254},{inch:7,kg:7311},{inch:6.5,kg:7369},{inch:6,kg:7427},{inch:5.5,kg:7461},{inch:5,kg:7495}];
let loadHistory=[];
function calculate(){
let target=parseFloat(document.getElementById('targetKg').value);
if(isNaN(target)||target<=0){alert('Enter valid KG');return;}
let reqDiff=target/DENSITY;
let ideal=START_KG-reqDiff;
let best=chart.reduce((a,b)=>Math.abs(b.kg-ideal)<Math.abs(a.kg-ideal)?b:a);
let loaded=START_KG-best.kg;
let finalC=loaded*DENSITY;
loadHistory.unshift(`Target:${target}→End:${best.inch}in=${best.kg}kg→C=${finalC.toFixed(2)}kg`);
if(loadHistory.length>5)loadHistory.pop();
document.getElementById('output').innerHTML=`<p>End: ${best.inch} in = ${best.kg} kg<br>Loaded: ${loaded} kg<br>C = ${finalC.toFixed(2)} kg</p>`;
updateLog();
animateTruck();
}
function updateLog(){
let ul=document.getElementById('loadLog');ul.innerHTML='';
loadHistory.forEach(l=>{let li=document.createElement('li');li.textContent=l;ul.appendChild(li);});
}
// Simple truck animation
function animateTruck(){
let canvas=document.getElementById('truckCanvas');
let ctx=canvas.getContext('2d');
let x=0;ctx.clearRect(0,0,canvas.width,canvas.height);
function drawFrame(){
ctx.clearRect(0,0,canvas.width,canvas.height);
// truck body
ctx.fillStyle='#22c55e';ctx.fillRect(x,120,80,40);
ctx.fillStyle='#111827';ctx.fillRect(x+10,110,60,20);
// hose
ctx.strokeStyle='#fbbf24';ctx.lineWidth=4;
ctx.beginPath();ctx.moveTo(x+80,130);ctx.lineTo(x+120,100);ctx.stroke();
// emulsion flow
ctx.strokeStyle='#f87171';ctx.beginPath();ctx.moveTo(x+120,100);ctx.lineTo(x+150,110);ctx.stroke();
x+=2;if(x>canvas.width) x=-80;
requestAnimationFrame(drawFrame);
}
drawFrame();
}
</script>
</body>
</html>
